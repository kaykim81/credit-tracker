kind = "web"
previewPath = "/"
title = "Credit Score Tracker"
version = "1.0.0"
id = "artifacts/credit-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25683
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/credit-tracker run dev"

[services.env]
PORT = "25683"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/credit-tracker", "run", "build"]
publicDir = "artifacts/credit-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
